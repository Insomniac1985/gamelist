stages:
  - sync

sync_from_github:
  stage: sync
  image: alpine/git:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
  script:
    - git config user.name "gitlab-ci-bot"
    - git config user.email "gitlab-ci-bot@example.com"
    - cp wrangler.toml /tmp/wrangler.toml
    - git remote add upstream https://github.com/ShabiiEXE/Gamelist.git || git remote set-url upstream https://github.com/ShabiiEXE/Gamelist.git
    - git fetch upstream main
    - git checkout main
    - git merge --no-edit upstream/main || true
    - cp /tmp/wrangler.toml wrangler.toml
    - git add wrangler.toml
    - git commit -m "Sync from upstream while preserving Wrangler config" || true
    - git push "https://oauth2:${GITLAB_SYNC_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" main
