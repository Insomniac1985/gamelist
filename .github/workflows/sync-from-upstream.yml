name: Sync from upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    if: github.repository != 'ShabiiEXE/Gamelist'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull updates from ShabiiEXE/Gamelist and keep fork Wrangler config
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp wrangler.toml "$RUNNER_TEMP/wrangler.toml"
          git remote add upstream https://github.com/ShabiiEXE/Gamelist.git || git remote set-url upstream https://github.com/ShabiiEXE/Gamelist.git
          git fetch upstream main
          git checkout main
          set +e
          git merge --no-edit upstream/main
          merge_status=$?
          set -e
          cp "$RUNNER_TEMP/wrangler.toml" wrangler.toml
          git add wrangler.toml
          if [ "$merge_status" -ne 0 ]; then
            unresolved="$(git diff --name-only --diff-filter=U)"
            unresolved_without_wrangler="$(printf "%s\n" "$unresolved" | grep -v '^wrangler.toml$' || true)"
            if [ -n "$unresolved_without_wrangler" ]; then
              echo "Upstream sync has conflicts outside wrangler.toml:"
              printf "%s\n" "$unresolved_without_wrangler"
              exit 1
            fi
            git commit --no-edit
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Keep fork Wrangler config"
          fi
          git push origin main
